<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Part 4 – Tổng hợp</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/listeningkey.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 80px; }

        .answer-inline {
            background: #f0f7ff;
            border-left: 4px solid #0d6efd;
            border-radius: 0 8px 8px 0;
            padding: 14px 18px;
            font-size: 14.5px;
            line-height: 1.75;
            color: #1a1a2e;
            animation: fadeIn 0.18s ease;
        }

        .answer-inline-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c757d;
            margin-bottom: 6px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .btn-ans { min-width: 110px; }
        .btn-ans.active { background-color: #0d6efd; color: #fff; border-color: #0d6efd; }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center p-3 bg-white text-dark shadow-sm">
    <div class="d-flex align-items-center">
        <a href="/speaking_question4" class="me-3 text-decoration-none text-dark fs-4">
            <i class="bi bi-house-door-fill me-2"></i>
            <span>Aptis Keys</span>
        </a>
    </div>
    <div class="fs-5 fw-bold">Speaking Part 4 – Tổng hợp</div>
</div>

<!-- TABLE -->
<div class="container py-4">
    <h4 class="mb-4 fw-bold">
        <i class="bi bi-list-ul text-primary me-2"></i>Speaking Part 4 – Danh sách câu hỏi
    </h4>

    <table class="table table-bordered align-middle">
        <thead class="table-light">
            <tr>
                <th style="width:4%;">#</th>
                <th>Câu hỏi</th>
                <th style="width:14%;">Đáp án mẫu</th>
            </tr>
        </thead>
        <tbody id="questionTableBody"></tbody>
    </table>
</div>

<!-- FOOTER -->
<div class="footer">
    <button class="btn btn-back" onclick="window.location.href='/speaking_question4'">Back</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/speaking/speaking_question4_practice.js"></script>
<script src="js/speaking/speaking_question4_total.js"></script>
</body>
</html>

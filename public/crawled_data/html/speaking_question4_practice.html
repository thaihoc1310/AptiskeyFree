<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Part 4 – Practice</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/listeningkey.css" rel="stylesheet">
    <style>
        body { background-color:#f5f7fa; padding-bottom:80px; }

        .question-card {
            background:#fff;
            border-radius:16px;
            box-shadow:0 4px 20px rgba(0,0,0,.08);
            padding:40px;
            margin-top:30px;
        }

        .question-counter {
            font-size:18px; color:#495057; font-weight:700;
            letter-spacing:.5px; text-transform:uppercase;
            margin-bottom:20px; display:flex; align-items:center; gap:6px;
        }
        #questionInput {
            width:80px; font-size:18px; font-weight:700; color:#0d6efd;
            border:2px solid #0d6efd; border-radius:6px; background:#fff;
            text-align:center; padding:2px 4px; outline:none;
        }
        #questionInput:focus { border-color:#0a58ca; }
        #questionTotal { color:#6c757d; }

        .progress-bar-wrapper { background:#e9ecef; border-radius:50px; height:6px; margin-bottom:24px; overflow:hidden; }
        .progress-bar-fill { height:100%; border-radius:50px; background:linear-gradient(90deg,#007bff,#00c6ff); transition:width .4s ease; }

        .prep-badge {
            display:inline-flex; align-items:center; gap:6px;
            background:#fff3cd; border:1px solid #ffc107; color:#664d03;
            border-radius:8px; padding:6px 14px; font-size:13px; font-weight:600;
            margin-bottom:20px;
        }

        .question-row { display:flex; align-items:flex-start; gap:20px; }
        .question-text { flex:1; font-size:1.4rem; font-weight:600; color:#1a1a2e; line-height:1.6; }

        #recordBtn {
            flex-shrink:0; font-size:15px; font-weight:600; padding:12px 22px;
            border-radius:50px; border:none; display:flex; align-items:center; gap:8px;
            transition:all .2s ease; box-shadow:0 2px 8px rgba(0,0,0,.15); white-space:nowrap;
        }

        .transcript-section { margin-top:30px; }
        .transcript-label { font-size:12px; font-weight:700; color:#6c757d; text-transform:uppercase; letter-spacing:1px; }

        #transcriptBox {
            min-height:100px; background:#f8f9fa; border:2px solid #e9ecef;
            border-radius:12px; padding:20px; font-size:1rem; line-height:1.7; transition:border-color .3s;
        }

        .placeholder-text { color:#adb5bd; font-style:italic; }
        .final-text { color:#1a1a2e; }
        .interim-text { color:#6c757d; font-style:italic; }
        .error-text { color:#dc3545; }
        .listening-pulse { color:#dc3545; font-weight:600; animation:pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        .answer-buttons { margin-top:28px; display:flex; gap:12px; flex-wrap:wrap; }
        .btn-answer { flex:1; min-width:140px; padding:12px 20px; font-size:14px; font-weight:600; border-radius:10px; }

        .divider { border:none; border-top:2px dashed #e9ecef; margin:30px 0 0; }

        .answer-box { margin-top:14px; border-radius:12px; padding:18px 20px; animation:fadeSlideIn .2s ease; }
        .answer-box--primary { background:#eff6ff; border:1.5px solid #93c5fd; }

        .answer-box__header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .answer-box__label { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#6c757d; margin:0; }
        .answer-box__text { margin:0; font-size:1rem; line-height:1.8; color:#1a1a2e; }

        .btn-read {
            font-size:12px; font-weight:600; padding:4px 12px; border-radius:20px;
            border:1.5px solid #6c757d; background:transparent; color:#495057;
            cursor:pointer; display:flex; align-items:center; gap:5px; transition:all .2s;
        }
        .btn-read:hover { background:#e9ecef; }
        .btn-read.reading { border-color:#dc3545; color:#dc3545; background:#fff5f5; }

        @keyframes fadeSlideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center p-3 bg-white text-dark shadow-sm">
    <div class="d-flex align-items-center">
        <a href="/speaking_question4" class="me-3 text-decoration-none text-dark fs-4">
            <i class="bi bi-house-door-fill me-2"></i><span>Aptis Keys</span>
        </a>
    </div>
    <div class="fs-5 fw-bold">Speaking Part 4</div>
</div>

<!-- MAIN -->
<div class="container" style="max-width:780px;">
    <div class="question-card">

        <!-- Progress bar -->
        <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" id="progressBar" style="width:0%;"></div>
        </div>

        <!-- Counter -->
        <div class="question-counter">
            Question
            <input id="questionInput" type="number" min="1" value="1" title="Nhập số câu hoặc dùng nút tăng/giảm">
            / <span id="questionTotal">53</span>
        </div>

        <!-- Prep note -->
        <div class="prep-badge">
            <i class="bi bi-clock"></i> Chuẩn bị: 1 phút &nbsp;|&nbsp;
            <i class="bi bi-mic"></i> Nói: 2 phút
        </div>

        <!-- Question + Record button -->
        <div class="question-row">
            <div class="question-text" id="questionText"></div>
            <button class="btn btn-danger" id="recordBtn">
                <i class="bi bi-mic-fill"></i> Record
            </button>
        </div>

        <!-- Transcript area -->
        <div class="transcript-section">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="transcript-label mb-0">Your Answer</div>
                <button id="scoreBtn" class="btn btn-sm btn-primary" style="display:none;" onclick="scoreAnswer()">
                    <i class="bi bi-star-fill me-1"></i>Chấm điểm
                </button>
            </div>
            <div id="transcriptBox">
                <span class="placeholder-text">Your speech will appear here...</span>
            </div>
        </div>

        <!-- Audio playback -->
        <div id="audioPlayerSection" style="display:none;" class="transcript-section mt-3">
            <div class="transcript-label"><i class="bi bi-headphones me-1"></i>Playback</div>
            <audio id="audioPlayer" controls style="width:100%; border-radius:10px;"></audio>
        </div>

        <hr class="divider">

        <!-- Sample answer button -->
        <div class="answer-buttons">
            <button class="btn btn-outline-primary btn-answer" id="answerBtn1" onclick="showAnswer()">
                <i class="bi bi-chat-text me-2"></i>Sample Answer
            </button>
        </div>

        <!-- Inline answer box -->
        <div id="answerBox1" class="answer-box answer-box--primary" style="display:none;">
            <div class="answer-box__header">
                <div class="answer-box__label">Sample Answer</div>
                <button class="btn-read" id="readBtn1" onclick="toggleRead()">
                    <i class="bi bi-volume-up-fill"></i> Đọc
                </button>
            </div>
            <p id="answerText1" class="answer-box__text"></p>
        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <button class="btn btn-back" id="backButton" disabled>Back</button>
    <button class="btn btn-next" id="nextButton">Next</button>
</div>

<!-- Score Modal -->
<div class="modal fade" id="scoreModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-star-fill me-2"></i>Kết quả chấm điểm</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="scoreModalBody" style="font-size:1rem; line-height:1.8; white-space:pre-wrap;"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/speaking/speaking_question4_practice.js"></script>
</body>
</html>

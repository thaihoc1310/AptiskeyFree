<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptis writing keys</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/readingkey.css" rel="stylesheet">
    <script>
        var m = window.location.pathname.match(/writingkey(\d+)/);
        if (m) { document.write('<script src="js/writing/writingkey' + m[1] + '.js"><' + '/script>'); }
    </script>
</head>

<body>
<!-- ====================================================================================
                  HEADER SECTION
======================================================================================== -->
<div class="header d-flex justify-content-between align-items-center p-3 bg-primary text-white shadow-lg">
  <!-- Left Section -->
  <div class="d-flex align-items-center">
    <a href="/writing_bode" class="me-3 text-decoration-none text-white fs-4 d-flex align-items-center">
      <i class="bi bi-house-door-fill me-2 fs-5"></i>
      <span class="fw-bold">Aptis Keys</span>
    </a>
  </div>

  <!-- Center Section (Countdown Timer) -->
  <div class="d-flex align-items-center">
    <span class="countdown fs-4 fw-bold" id="countdownTimer">34:00</span>
  </div>

  <!-- Right Section (Current Step) -->
  <div id="keys_id" class="fs-5 fw-bold text-light">
    Bộ đề
  </div>
</div>


<!-- ====================================================================================
                    Question 1
======================================================================================== -->
<div id="question1" class="container py-5">
    <h1 class="mb-4" id="topic-title_q1"></h1>
    <h6 class="mb-4" id="description_q1"></h6>
    <form id="question1Form">
        <div id="questions-container1"></div>
        <button type="button" id="question1_showanswer" class="btn btn-info">Xem đáp án</button>
    </form>
</div>

<div class="modal fade" id="question1_answerModal" tabindex="-1" aria-labelledby="question1_answerModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="question1_answerModalLabel">Question 1 - Answer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>


<!-- ====================================================================================
                    Question 2
======================================================================================== -->
<div id="question2" class="container py-5">
    <h1 class="mb-4" id="topic-title_q2"></h1>
    <h6 class="mb-4" id="description_q2"></h6>
    <form id="question2Form">
        <div id="questions-container2"></div>
        <div class="d-flex justify-content-end mb-3">
            <label id="wordCountLabel" class="form-label">Word Count: 0</label>
        </div>
        <button type="button" id="question2_showanswer" class="btn btn-info">Xem đáp án</button>
    </form>
</div>

<div class="modal fade" id="question2_answerModal" tabindex="-1" aria-labelledby="question2_answerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="question2_answerModalLabel">Question2: Answer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body2"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>


<!-- ====================================================================================
                    Question 3
======================================================================================== -->
<div id="question3" class="container py-5">
    <h1 class="mb-4" id="topic-title_q3"></h1>
    <h6 class="mb-4" id="description_q3"></h6>
    <form id="question3Form">
        <div id="questions-container3"></div>
        <button type="button" id="question3_showanswer" class="btn btn-info">Xem đáp án</button>
    </form>
</div>

<div class="modal fade" id="question3_answerModal" tabindex="-1" aria-labelledby="question3_answerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="question3_answerModalLabel">Question 3: Answer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body3"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>


<!-- ====================================================================================
                    Question 4
======================================================================================== -->
<div id="question4" class="container py-5">
    <h1 class="mb-4" id="topic-title_q4"></h1>
    <h6 class="mb-4" id="description_q4"></h6>
    <form id="question4Form">
        <div id="questions-container4"></div>
        <button type="button" id="question4_showanswer" class="btn btn-info">Xem đáp án</button>
    </form>
</div>

<div class="modal fade" id="question4_answerModal" tabindex="-1" aria-labelledby="question4_answerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="question4_answerModalLabel">Question 4: Answer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body4"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>


<!-- Modal Loading -->
<div class="modal fade" id="loadingModal" tabindex="-1" aria-labelledby="loadingModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="loadingModalLabel">AI đang chấm điểm</h5>
            </div>
            <div class="modal-body text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p>Hãy chờ một lát!!</p>
            </div>
        </div>
    </div>
</div>

<!-- Modal kết quả -->
<div class="modal fade" id="resultModal" tabindex="-1" aria-labelledby="resultModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="resultModalLabel">Kết quả chấm điểm</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body-ai"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>


<!-- ============================================
                  FOOTER SECTION
================================================ -->
<div class="footer">
    <button class="btn btn-back" id="backButton">Back</button>
    <button type="button" id="btn_checkallquestions" class="btn btn-primary">Chấm điểm</button>
    <button class="btn btn-next" id="nextButton">Next</button>
</div>

<!-- Modal xác nhận -->
<div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="confirmationModalLabel">Xác nhận phần thi</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Bạn có chắc chắn muốn chấm điểm tất cả các câu hỏi?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" id="confirmButton" class="btn btn-primary">Yes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

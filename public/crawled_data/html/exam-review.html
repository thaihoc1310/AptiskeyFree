<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review đề thi Aptis</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f5f7fb;
      font-family: Arial, sans-serif;
    }

    .review-card {
      border: 0;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .page-title {
      font-weight: 700;
    }

    .review-content {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 15px;
    }

    .meta-text {
      font-size: 13px;
      color: #6c757d;
    }

    textarea.form-control {
      min-height: 260px;
      resize: vertical;
    }

    .sidebar-sticky {
      position: sticky;
      top: 20px;
    }

    .user-info-label {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .user-info-value {
      font-size: 14px;
      color: #6c757d;
      word-break: break-word;
    }

    .review-toggle {
      font-weight: 700;
      color: #212529;
    }

    .review-toggle:hover {
      color: #0d6efd;
    }

    .preview-line {
      font-size: 14px;
      color: #6c757d;
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-box-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .review-header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .sidebar-logo a:hover {
      opacity: 0.85;
    }

    .year-toggle {
      background: #e9ecef;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: #212529;
    }

    .year-toggle:hover {
      background: #dee2e6;
    }

    .year-toggle .chevron {
      transition: transform 0.2s;
      display: inline-block;
    }

    .year-toggle[aria-expanded="true"] .chevron {
      transform: rotate(180deg);
    }
  </style>
</head>
<body>
  <div class="container-fluid py-4">
    <div class="row g-4">

      <div class="col-lg-3 col-xl-2">
        <div class="card review-card sidebar-sticky">
          <div class="text-center py-3 border-bottom sidebar-logo">
            <a href="/home.html" class="d-flex align-items-center justify-content-center text-decoration-none gap-2">
              <img 
                src="./images/assets/img/AdminLTELogo.png" 
                alt="Aptis keys"
                style="width: 36px; height: 36px; object-fit: contain;"
              >
              <span class="fw-bold text-dark fs-5">Aptis keys</span>
            </a>
          </div>
          <div class="card-body p-3 p-lg-4">
            <div class="sidebar-box-title">Thông tin người dùng</div>

            <div class="mb-3">
              <div class="user-info-label">Tên</div>
              <div id="sidebarUserName" class="user-info-value">Đang tải...</div>
            </div>

            <div class="mb-3">
              <div class="user-info-label">Email</div>
              <div id="sidebarUserEmail" class="user-info-value">Đang tải...</div>
            </div>

            <div class="mb-4">
              <div class="user-info-label">Vai trò</div>
              <div id="sidebarUserRole" class="user-info-value">Đang tải...</div>
            </div>

            <hr>

            <div class="sidebar-box-title">Chọn ngày review</div>

            <div class="mb-3">
              <label for="filterDate" class="form-label fw-semibold">Lọc theo ngày</label>
              <input type="date" id="filterDate" class="form-control">
            </div>

            <div class="d-grid gap-2 mb-4">
              <button id="filterBtn" class="btn btn-primary" type="button">Xem review</button>
              <button id="clearFilterBtn" class="btn btn-outline-secondary" type="button">Xóa lọc</button>
            </div>

            <hr>

            <div class="fw-bold mb-3">Ngày có review</div>
            <div id="dateList" class="list-group small">
              <div class="text-muted">Đang tải...</div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-9 col-xl-10">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <div>
            <h1 class="page-title mb-1">Review đề thi Aptis</h1>
            <p class="text-muted mb-0">Hãy đăng review bài thi của bạn để mọi người cùng xem nhé!</p>
          </div>
          <div>
            <span id="currentFilterText" class="badge text-bg-primary">Tất cả ngày</span>
          </div>
        </div>

        <div class="card review-card mb-4">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <h4 class="mb-0">Đăng bài review mới</h4>
              <button
                class="btn btn-primary"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#reviewFormCollapse"
                aria-expanded="false"
                aria-controls="reviewFormCollapse"
              >
                Đăng bài review
              </button>
            </div>

            <div class="collapse mt-3" id="reviewFormCollapse">
              <form id="postForm">
                <div class="mb-3">
                  <label for="content" class="form-label fw-semibold">Nội dung bài viết</label>
                  <textarea
                    id="content"
                    class="form-control"
                    placeholder="Nhập nội dung review đề thi Aptis..."
                    required
                  ></textarea>
                </div>

                <div class="form-actions">
                  <button type="submit" class="btn btn-primary">Đăng bài</button>
                  <button type="button" id="reloadBtn" class="btn btn-outline-secondary">Tải lại danh sách</button>
                </div>
              </form>
            </div>

            <div id="alertBox" class="mt-3"></div>
          </div>
        </div>

        <div class="card review-card">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
              <h4 class="mb-0">Danh sách review</h4>
              <span id="totalPosts" class="badge text-bg-dark">0 bài</span>
            </div>

            <div id="postsContainer" class="d-grid gap-3">
              <div class="text-muted">Đang tải dữ liệu...</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const postForm = document.getElementById('postForm');
    const contentInput = document.getElementById('content');
    const alertBox = document.getElementById('alertBox');
    const postsContainer = document.getElementById('postsContainer');
    const totalPosts = document.getElementById('totalPosts');
    const reloadBtn = document.getElementById('reloadBtn');
    const filterDate = document.getElementById('filterDate');
    const filterBtn = document.getElementById('filterBtn');
    const clearFilterBtn = document.getElementById('clearFilterBtn');
    const dateList = document.getElementById('dateList');
    const currentFilterText = document.getElementById('currentFilterText');

    const sidebarUserName = document.getElementById('sidebarUserName');
    const sidebarUserEmail = document.getElementById('sidebarUserEmail');
    const sidebarUserRole = document.getElementById('sidebarUserRole');

    let currentUser = {
      isLoggedIn: false,
      isAdmin: false,
      fullName: '',
      email: ''
    };

    function showAlert(message, type = 'success') {
      alertBox.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text ?? '';
      return div.innerHTML;
    }

    function formatDateTime(dateString) {
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;
      return date.toLocaleString('vi-VN');
    }

    function formatOnlyDate(dateString) {
      if (!dateString) return '';
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;
      return date.toLocaleDateString('vi-VN');
    }

    function updateSidebarUser() {
      if (currentUser.isLoggedIn) {
        sidebarUserName.textContent = currentUser.fullName || 'Chưa có tên';
        sidebarUserEmail.textContent = currentUser.email || 'Không có email';
        sidebarUserRole.textContent = currentUser.isAdmin ? 'Admin' : 'User';
      } else {
        sidebarUserName.textContent = 'Khách';
        sidebarUserEmail.textContent = '-';
        sidebarUserRole.textContent = 'Guest';
      }
    }

    async function initializeUser() {
      try {
        const response = await fetch('/api/me');

        if (!response.ok) {
          currentUser = {
            isLoggedIn: false,
            isAdmin: false,
            fullName: '',
            email: ''
          };
          updateSidebarUser();
          return;
        }

        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          throw new TypeError('Server không trả về JSON hợp lệ');
        }

        const data = await response.json();

        if (data.success) {
          currentUser = {
            isLoggedIn: true,
            isAdmin: !!data.isAdmin,
            fullName: data.fullName || '',
            email: data.email || ''
          };
        } else {
          currentUser = {
            isLoggedIn: false,
            isAdmin: false,
            fullName: '',
            email: ''
          };
        }

        updateSidebarUser();
      } catch (err) {
        console.warn('Lỗi xác thực, chuyển về chế độ khách:', err.message);
        currentUser = {
          isLoggedIn: false,
          isAdmin: false,
          fullName: '',
          email: ''
        };
        updateSidebarUser();
      }
    }

    async function loadDateList() {
      try {
        const response = await fetch('/api/posts/dates');

    const contentType = response.headers.get('content-type');

    if (!contentType || !contentType.includes('application/json')) {
      dateList.innerHTML = `
        <div class="alert alert-warning mb-0">
          Bạn cần đăng nhập để xem nội dung này.
          <a href="/login.html" class="fw-bold text-decoration-underline">
            Đăng nhập tại đây
          </a>
        </div>
      `;
      return;
    }
        
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || 'Không thể tải danh sách ngày review.');
        }

        const dates = Array.isArray(result.data) ? result.data : [];

        if (dates.length === 0) {
          dateList.innerHTML = '<div class="text-muted">Chưa có ngày review nào.</div>';
          return;
        }

        // Nhóm theo năm
        const byYear = {};
        dates.forEach(item => {
          const year = new Date(item.review_date).getFullYear();
          if (!byYear[year]) byYear[year] = [];
          byYear[year].push(item);
        });

        const years = Object.keys(byYear).sort((a, b) => b - a);

        dateList.innerHTML = years.map((year) => {
          const collapseId = `yearCollapse${year}`;
          const items = byYear[year].map(item => `
            <button
              type="button"
              class="list-group-item list-group-item-action d-flex justify-content-between align-items-center date-item"
              data-date="${item.review_date}"
            >
              <span>${formatOnlyDate(item.review_date)}</span>
              <span class="badge text-bg-secondary">${item.total}</span>
            </button>
          `).join('');

          return `
            <div class="mb-1">
              <button
                class="year-toggle btn-sm w-100 text-start d-flex justify-content-between align-items-center"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#${collapseId}"
                aria-expanded="false"
              >
                <span class="fw-semibold">${year}</span>
                <span class="chevron">▾</span>
              </button>
              <div class="collapse" id="${collapseId}">
                <div class="list-group list-group-flush mt-1">
                  ${items}
                </div>
              </div>
            </div>
          `;
        }).join('');

        document.querySelectorAll('.date-item').forEach(button => {
          button.addEventListener('click', () => {
            const selectedDate = button.dataset.date;
            filterDate.value = selectedDate;
            loadPosts(selectedDate);
          });
        });
      } catch (error) {
        dateList.innerHTML = `<div class="alert alert-danger mb-0">${escapeHtml(error.message)}</div>`;
      }
    }

    async function approvePost(postId) {
      try {
        const response = await fetch(`/api/posts/${postId}/approve`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || 'Duyệt bài thất bại.');
        }

        showAlert('Duyệt bài thành công.');
        await loadPosts(filterDate.value);
        await loadDateList();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    async function deletePost(postId) {
      try {
        const confirmed = window.confirm('Bạn có chắc muốn xóa bài này không?');
        if (!confirmed) return;

        const response = await fetch(`/api/posts/${postId}`, {
          method: 'DELETE'
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || 'Xóa bài thất bại.');
        }

        showAlert('Xóa bài thành công.');
        await loadPosts(filterDate.value);
        await loadDateList();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    function getReviewIndex(post) {
      if (post.daily_index !== undefined && post.daily_index !== null) {
        return post.daily_index;
      }
      return post.id;
    }

    function buildPostCard(post) {
      const collapseId = `reviewCollapse${post.id}`;
      const preview = (post.content || '').split('\n')[0] || '';
      const reviewIndex = getReviewIndex(post);

      return `
        <div class="card border-0 bg-light">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start gap-2 flex-wrap">
              <div>
                <button
                  class="btn btn-link text-decoration-none p-0 text-start review-toggle"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#${collapseId}"
                  aria-expanded="false"
                  aria-controls="${collapseId}"
                >
                  Ngày ${formatOnlyDate(post.created_at)} - Review #${post.daily_index}
                </button>
                <div class="meta-text">Người đăng: ${escapeHtml(post.poster_name || 'Ẩn danh')}</div>
              </div>

              <div class="text-end">
                <div class="meta-text mb-1">Đăng lúc: ${formatDateTime(post.created_at)}</div>
                <span class="badge ${post.approved ? 'text-bg-success' : 'text-bg-warning'}">
                  ${post.approved ? 'Đã duyệt' : 'Chờ duyệt'}
                </span>
              </div>
            </div>

            <div class="preview-line">${escapeHtml(preview)}</div>

            <div class="collapse mt-3" id="${collapseId}">
              <div class="review-content mb-3">${escapeHtml(post.content)}</div>

              ${currentUser.isAdmin ? `
                <div class="review-header-actions">
                  ${!post.approved ? `
                    <button class="btn btn-sm btn-success approve-btn" data-id="${post.id}">
                      Duyệt bài
                    </button>
                  ` : ''}

                  <button class="btn btn-sm btn-danger delete-btn" data-id="${post.id}">
                    Xóa bài
                  </button>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    async function loadPosts(selectedDate = '') {
      postsContainer.innerHTML = '<div class="text-muted">Đang tải dữ liệu...</div>';

      try {
        const url = selectedDate
          ? `/api/posts?date=${encodeURIComponent(selectedDate)}`
          : '/api/posts';

        const response = await fetch(url);

        // 🔥 kiểm tra content-type trước
const contentType = response.headers.get("content-type");

if (!contentType || !contentType.includes("application/json")) {
  // 👉 server trả HTML (chưa login)
postsContainer.innerHTML = `
  <div class="alert alert-warning">
    Bạn cần đăng nhập để xem nội dung này. 
    <a href="/login.html" class="fw-bold text-decoration-underline">
      Đăng nhập tại đây
    </a>
  </div>
`;
  return;
}



        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || 'Không thể tải danh sách bài viết.');
        }

        const posts = Array.isArray(result.data) ? result.data : [];

        totalPosts.textContent = `${posts.length} bài`;
        currentFilterText.textContent = selectedDate
          ? `Ngày ${formatOnlyDate(selectedDate)}`
          : 'Tất cả ngày';

        if (posts.length === 0) {
          postsContainer.innerHTML = '<div class="text-muted">Không có bài review nào trong ngày đã chọn.</div>';
          return;
        }

        postsContainer.innerHTML = posts.map(buildPostCard).join('');

        document.querySelectorAll('.approve-btn').forEach(button => {
          button.addEventListener('click', () => {
            approvePost(button.dataset.id);
          });
        });

        document.querySelectorAll('.delete-btn').forEach(button => {
          button.addEventListener('click', () => {
            deletePost(button.dataset.id);
          });
        });
      } catch (error) {
        postsContainer.innerHTML = `<div class="alert alert-danger mb-0">${escapeHtml(error.message)}</div>`;
      }
    }

    async function submitPost(event) {
      event.preventDefault();

      const content = contentInput.value.trim();

      if (!content) {
        showAlert('Vui lòng nhập nội dung bài viết.', 'warning');
        return;
      }

      if (!currentUser.isLoggedIn) {
        showAlert('Bạn cần đăng nhập để đăng bài.', 'warning');
        return;
      }

      try {
        const response = await fetch('/api/posts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ content })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || 'Đăng bài thất bại.');
        }

        showAlert(currentUser.isAdmin ? 'Đăng bài thành công.' : 'Đăng bài thành công, đang chờ admin duyệt.');
        contentInput.value = '';

        await loadPosts(filterDate.value);
        await loadDateList();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    function bindEvents() {
      postForm.addEventListener('submit', submitPost);

      reloadBtn.addEventListener('click', () => {
        loadPosts(filterDate.value);
      });

      filterBtn.addEventListener('click', () => {
        loadPosts(filterDate.value);
      });

      clearFilterBtn.addEventListener('click', () => {
        filterDate.value = '';
        loadPosts();
      });
    }

    async function bootPage() {
      bindEvents();
      await initializeUser();
      await loadPosts();
      await loadDateList();
    }

    bootPage();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

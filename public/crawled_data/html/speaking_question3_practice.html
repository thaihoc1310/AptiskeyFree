<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Part 3 – Practice</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/listeningkey.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; padding-bottom: 80px; }

        .practice-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            margin-top: 24px;
        }

        .set-counter {
            font-size: 18px;
            font-weight: 700;
            color: #495057;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 20px 28px 0;
        }
        #setInput {
            width: 80px;
            font-size: 18px;
            font-weight: 700;
            color: #0d6efd;
            border: 2px solid #0d6efd;
            border-radius: 6px;
            background: #fff;
            text-align: center;
            padding: 2px 4px;
            outline: none;
        }
        #setInput:focus { border-color: #0a58ca; }
        #setTotal { color: #6c757d; }

        .progress-bar-wrapper { background: #e9ecef; height: 5px; margin-top: 12px; }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #007bff, #00c6ff);
            transition: width 0.4s ease;
        }

        /* Two images side by side */
        .picture-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 20px 28px 0;
        }
        .picture-wrapper { position: relative; }
        .picture-label {
            position: absolute;
            top: 8px; left: 8px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .picture-img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 10px;
            border: 1px solid #e9ecef;
            background: #f8f9fa;
        }
        @media (max-width: 576px) {
            .picture-section { grid-template-columns: 1fr; }
            .picture-img { height: 160px; }
        }

        /* Q tabs */
        .q-tabs { display: flex; gap: 10px; padding: 20px 28px 0; }
        .q-tab {
            flex: 1; padding: 10px 6px; border-radius: 10px;
            border: 2px solid #e9ecef; background: #f8f9fa;
            font-size: 13px; font-weight: 600; color: #6c757d;
            cursor: pointer; text-align: center; transition: all 0.15s;
        }
        .q-tab.active { border-color: #0d6efd; background: #eff6ff; color: #0d6efd; }
        .q-tab:hover:not(.active) { background: #e9ecef; }

        /* Question */
        .question-section { padding: 20px 28px 0; }
        .question-row { display: flex; align-items: flex-start; gap: 16px; }
        .question-text { flex: 1; font-size: 1.2rem; font-weight: 600; color: #1a1a2e; line-height: 1.6; }
        #recordBtn {
            flex-shrink: 0; font-size: 14px; font-weight: 600;
            padding: 10px 20px; border-radius: 50px; border: none;
            display: flex; align-items: center; gap: 7px; white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: all 0.2s;
        }

        /* Transcript */
        .transcript-section { padding: 16px 28px 0; }
        .transcript-label {
            font-size: 12px; font-weight: 700; color: #6c757d;
            text-transform: uppercase; letter-spacing: 1px;
        }
        #transcriptBox {
            min-height: 80px; background: #f8f9fa; border: 2px solid #e9ecef;
            border-radius: 12px; padding: 16px; font-size: 1rem; line-height: 1.7; margin-top: 8px;
        }
        .placeholder-text { color: #adb5bd; font-style: italic; }
        .final-text { color: #1a1a2e; }
        .interim-text { color: #6c757d; font-style: italic; }
        .error-text { color: #dc3545; }
        .listening-pulse { color: #dc3545; font-weight: 600; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        #audioPlayerSection { padding: 10px 28px 0; }

        .divider { border: none; border-top: 2px dashed #e9ecef; margin: 20px 28px 0; }

        /* Answer box */
        .answer-buttons { display: flex; gap: 10px; padding: 16px 28px 0; flex-wrap: wrap; }
        .btn-answer { flex: 1; min-width: 130px; padding: 10px 16px; font-size: 13.5px; font-weight: 600; border-radius: 10px; }

        .answer-box { margin: 12px 28px 0; border-radius: 12px; padding: 16px 18px; animation: fadeSlideIn 0.2s ease; }
        .answer-box--primary { background: #eff6ff; border: 1.5px solid #93c5fd; }
        .answer-box__header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .answer-box__label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #6c757d; }
        .answer-box__text { margin: 0; font-size: 1rem; line-height: 1.8; color: #1a1a2e; }

        .btn-read {
            font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
            border: 1.5px solid #6c757d; background: transparent; color: #495057;
            cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.2s;
        }
        .btn-read:hover { background: #e9ecef; }
        .btn-read.reading { border-color: #dc3545; color: #dc3545; background: #fff5f5; }

        @keyframes fadeSlideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
        .card-bottom-pad { height: 24px; }

        #scoreBtn { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center p-3 bg-white text-dark shadow-sm">
    <div class="d-flex align-items-center">
        <a href="/speaking_question3" class="me-3 text-decoration-none text-dark fs-4">
            <i class="bi bi-house-door-fill me-2"></i>
            <span>Aptis Keys</span>
        </a>
    </div>
    <div class="fs-5 fw-bold">Speaking Part 3</div>
</div>

<!-- MAIN -->
<div class="container" style="max-width: 860px;">
    <div class="practice-card">

        <!-- Set counter -->
        <div class="set-counter">
            Speak question
            <input id="setInput" type="number" min="1" value="1" title="Nhập số câu hoặc dùng nút tăng/giảm">
            / <span id="setTotal">25</span>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" id="progressBar" style="width:4%;"></div>
        </div>

        <!-- Two images -->
        <div class="picture-section">
            <div class="picture-wrapper">
                <span class="picture-label">Ảnh 1</span>
                <img id="pictureImg1" class="picture-img" src="" alt="Picture 1" onerror="this.style.display='none'">
            </div>
            <div class="picture-wrapper">
                <span class="picture-label">Ảnh 2</span>
                <img id="pictureImg2" class="picture-img" src="" alt="Picture 2" onerror="this.style.display='none'">
            </div>
        </div>

        <!-- Q tabs -->
        <div class="q-tabs">
            <div class="q-tab active" id="tab1" onclick="switchQuestion(1)">
                <i class="bi bi-images me-1"></i>Q1 – So sánh
            </div>
            <div class="q-tab" id="tab2" onclick="switchQuestion(2)">
                <i class="bi bi-chat-dots me-1"></i>Q2 – Liên quan
            </div>
            <div class="q-tab" id="tab3" onclick="switchQuestion(3)">
                <i class="bi bi-lightbulb me-1"></i>Q3 – Ý kiến
            </div>
        </div>

        <!-- Question + Record -->
        <div class="question-section">
            <div class="question-row">
                <div class="question-text" id="questionText"></div>
                <button class="btn btn-danger" id="recordBtn">
                    <i class="bi bi-mic-fill"></i> Record
                </button>
            </div>
        </div>

        <!-- Transcript -->
        <div class="transcript-section">
            <div class="d-flex justify-content-between align-items-center">
                <div class="transcript-label">Your Answer</div>
                <button id="scoreBtn" class="btn btn-sm btn-primary" style="display:none;" onclick="scoreAnswer()">
                    <i class="bi bi-star-fill me-1"></i>Chấm điểm
                </button>
            </div>
            <div id="transcriptBox">
                <span class="placeholder-text">Your speech will appear here...</span>
            </div>
        </div>

        <!-- Audio playback -->
        <div id="audioPlayerSection" style="display:none;" class="transcript-section">
            <div class="transcript-label mt-3"><i class="bi bi-headphones me-1"></i>Playback</div>
            <audio id="audioPlayer" controls style="width:100%; border-radius:10px; margin-top:8px;"></audio>
        </div>

        <hr class="divider">

        <!-- Sample answer button -->
        <div class="answer-buttons">
            <button class="btn btn-outline-primary btn-answer" id="answerBtn1" onclick="toggleSampleAnswer()">
                <i class="bi bi-chat-text me-2"></i>Sample Answer
            </button>
        </div>

        <!-- Inline answer box -->
        <div id="answerBox" class="answer-box answer-box--primary" style="display:none;">
            <div class="answer-box__header">
                <div class="answer-box__label">Sample Answer</div>
                <button class="btn-read" id="readBtn" onclick="toggleRead()">
                    <i class="bi bi-volume-up-fill"></i> Đọc
                </button>
            </div>
            <p id="answerText" class="answer-box__text"></p>
        </div>

        <div class="card-bottom-pad"></div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <button class="btn btn-back" id="prevSetBtn" disabled>← Back</button>
    <button class="btn btn-next" id="nextSetBtn">Next →</button>
</div>

<!-- Score Modal -->
<div class="modal fade" id="scoreModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-star-fill me-2"></i>Kết quả chấm điểm</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="scoreModalBody" style="font-size:1rem; line-height:1.8; white-space:pre-wrap;"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/speaking/speaking_question3_practice.js"></script>
</body>
</html>

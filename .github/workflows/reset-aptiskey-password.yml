name: 🔐 Reset Aptiskey admin password

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/reset-aptiskey-password.yml

permissions:
  contents: read

jobs:
  reset-password:
    runs-on: ubuntu-latest
    steps:
      - name: Reset password using existing secret
        env:
          APTISKEY_EMAIL: ${{ secrets.APTISKEY_EMAIL }}
          APTISKEY_PASSWORD: ${{ secrets.APTISKEY_PASSWORD }}
          APTISKEY_NEW_PASSWORD: ${{ secrets.APTISKEY_NEW_PASSWORD }}
        run: |
          set -euo pipefail
          set +x
          node --input-type=module <<'NODE'
          const baseUrl = 'https://aptiskey.com';
          const email = process.env.APTISKEY_EMAIL;
          const oldPassword = process.env.APTISKEY_PASSWORD;
          const newPassword = process.env.APTISKEY_NEW_PASSWORD;

          if (!email || !oldPassword || !newPassword) {
            throw new Error('Required Aptiskey secrets are not configured.');
          }
          if (oldPassword === newPassword) {
            throw new Error('The new password must differ from the current password.');
          }

          const loginResponse = await fetch(`${baseUrl}/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              Accept: 'application/json',
            },
            body: new URLSearchParams({ email, password: oldPassword }),
            redirect: 'manual',
          });
          const loginData = await loginResponse.json().catch(() => null);
          const setCookies = typeof loginResponse.headers.getSetCookie === 'function'
            ? loginResponse.headers.getSetCookie()
            : [loginResponse.headers.get('set-cookie')].filter(Boolean);
          const cookie = setCookies
            .map((value) => value.split(';', 1)[0])
            .filter(Boolean)
            .join('; ');

          if (!loginResponse.ok || !loginData?.success || !cookie) {
            throw new Error(loginData?.message || `Login failed (${loginResponse.status}).`);
          }

          const changeResponse = await fetch(`${baseUrl}/api/changepassword`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
              Cookie: cookie,
            },
            body: JSON.stringify({ oldPassword, newPassword, email }),
            redirect: 'manual',
          });
          const changeData = await changeResponse.json().catch(() => null);

          if (!changeResponse.ok) {
            throw new Error(changeData?.message || `Password reset failed (${changeResponse.status}).`);
          }

          console.log('Aptiskey admin password reset succeeded.');
          NODE
